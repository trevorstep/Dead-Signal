<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>My Character — Dead Signal</title>
<link rel="stylesheet" href="../css/styles.css">
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js"
    }
  }
</script>
</head>
<body>

<header class="app-header">
  <div class="app-logo">DEAD <span class="red">SIGNAL</span></div>
  <div class="app-tag" id="myName">— Player —</div>
  <div class="app-actions">
    <button class="btn btn--icon btn--ghost" id="btnRefresh" title="Refresh">↻</button>
    <button class="btn btn--icon btn--ghost" id="btnSignOut" title="Sign out">⏻</button>
  </div>
</header>

<main class="app-main">

  <!-- Profile Picture -->
  <section id="profilePicSection" style="text-align: center; margin-bottom: 32px; display: none;">
    <div style="position: relative; display: inline-block; width: 100px; height: 100px; margin: 0 auto;">
      <img id="profileAvatar" src="" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid var(--border-2); background: var(--surface); display: none; cursor: pointer;">
      <div id="profileAvatarPlaceholder" style="width: 100%; height: 100%; border-radius: 50%; border: 2px dashed var(--border-2); background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;">
        Add Photo
      </div>
      <input type="file" id="profileUpload" accept="image/*" style="display:none">
    </div>
  </section>

  <!-- Current Scene -->
  <section data-section="scene">
    <div class="section-title"><h2 class="h2">Where you are</h2></div>
    <div class="card">
      <div class="card-section">
        <div class="h3" id="sceneTitle">No scene set yet</div>
        <p id="sceneDesc" style="margin-top:8px;color:var(--text-dim);font-size:14px;line-height:1.6;white-space:pre-wrap"></p>
      </div>
    </div>
  </section>

  <!-- My Character -->
  <section data-section="me" style="margin-top: 32px;">
    <div class="section-title"><h2 class="h2">My Character</h2></div>
    <div id="myCard">
      <p class="label" style="text-align:center;padding:32px 0">Waiting for the DM to add you to the campaign…</p>
    </div>
  </section>

  <!-- Party -->
  <section data-section="party" style="margin-top: 32px;">
    <div class="section-title"><h2 class="h2">My Party</h2></div>
    <div id="partyList"></div>
  </section>

  <!-- Maps -->
  <section data-section="maps" style="margin-top: 32px;">
    <div class="section-title"><h2 class="h2">Maps & Images</h2></div>
    <div class="gallery" id="gallery"></div>
    <p class="label" id="emptyMaps" style="text-align:center;padding:32px 0">No images shared yet</p>
  </section>

  <!-- Quests -->
  <section data-section="quests" style="margin-top: 32px;">
    <div class="section-title"><h2 class="h2">Quests</h2></div>
    <div class="quest-list" id="questList"></div>
    <p class="label" id="emptyQuests" style="text-align:center;padding:32px 0">No quests yet</p>
  </section>

  <!-- Dice -->
  <section data-section="dice" style="margin-top: 32px;">
    <div class="section-title"><h2 class="h2">Dice</h2></div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
      <span class="label" style="margin:0">STAT MOD</span>
      <input class="input" id="statMod" type="number" value="0" style="width:80px;text-align:center">
    </div>
    <div class="dice-result">
      <div class="dice-num" id="diceNum" style="color:var(--text)">—</div>
      <div class="dice-label" id="diceLabel">PICK A DIE</div>
    </div>
    <div class="dice-grid">
      <button class="dice-btn" data-die="4">D4</button>
      <button class="dice-btn" data-die="6">D6</button>
      <button class="dice-btn" data-die="8">D8</button>
      <button class="dice-btn" data-die="10">D10</button>
      <button class="dice-btn" data-die="12">D12</button>
      <button class="dice-btn" data-die="20">D20</button>
      <button class="dice-btn" data-die="100">D100</button>
      <button class="dice-btn" data-die="2">COIN</button>
    </div>
  </section>

</main>

<nav class="app-tabbar">
  <button class="tabbar-btn active" data-jump="scene"><span class="icon">📍</span>Scene</button>
  <button class="tabbar-btn" data-jump="me"><span class="icon">👤</span>Me</button>
  <button class="tabbar-btn" data-jump="party"><span class="icon">👥</span>Party</button>
  <button class="tabbar-btn" data-jump="maps"><span class="icon">🗺️</span>Maps</button>
  <button class="tabbar-btn" data-jump="dice"><span class="icon">🎲</span>Dice</button>
</nav>

<div class="quota-warning" id="quotaWarning"></div>

<script type="module" src="../js/pages/play.js"></script>
</body>
</html>
